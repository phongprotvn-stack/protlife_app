<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang đăng nhập...</title>
  <style>
    body { margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #F8F8FA; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .loader { width: 40px; height: 40px; border: 4px solid #E5E7EB; border-top-color: #E6002D; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
  <script>
    // ─── Same config as main app ───
    var config = {
      apiKey: 'AIzaSyAOHECF4A8UIgS8M4GFy_Bnt2sk1xFhKpo',
      authDomain: 'protlife.vercel.app',
      projectId: 'protlife-3dd56',
      storageBucket: 'protlife-3dd56.firebasestorage.app',
      messagingSenderId: '811944642664',
      appId: '1:811944642664:web:92f1b8cc244ac6cc2413dd',
    };
    firebase.initializeApp(config);

    // Process the OAuth redirect result
    firebase.auth().getRedirectResult().then(function(result) {
      if (result.user) {
        // Signed in — redirect back to app
        window.location.href = '/';
      } else {
        // No redirect result — redirect back to app
        window.location.href = '/';
      }
    }).catch(function(error) {
      console.error('Auth handler error:', error.code, error.message);
      // Redirect back to app with error
      window.location.href = '/?auth_error=' + encodeURIComponent(error.code || error.message);
    });
  </script>
</head>
<body>
  <div class="loader"></div>
</body>
</html>
